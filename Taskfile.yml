# https://taskfile.dev

version: '3'

dotenv: [ '.env' ]
vars:
  Project: "fastgit"
  DesktopDir: "./desktop"
  FrontendDir: "./desktop/frontend"
  Base: "github.com/pubgo/funk/buildinfo"
  VERSION:
    sh: "git tag --sort=committerdate | tail -n 1"
  BUILD_TIME:
    sh: "date -u '+%Y-%m-%d %I:%M:%S %Z'"
  GIT_COMMIT:
    sh: "git rev-parse --short=8 HEAD"
  BRANCH_NAME:
    sh: "git branch ch --show-current"
  GIT_VERSION:
    sh: "git describe --always --abbrev=7 --dirty"

tasks:
  default:
    desc: "default task"
    cmds:
      - task -a
  gomod:
    cmds:
      - go mod tidy
  install:
    cmds:
      - go install .
  info:
    cmds:
      - echo "Project {{.Project}}"
      - echo "VERSION {{.VERSION}}"
      - echo "GIT_VERSION {{.GIT_VERSION}}"
    silent: true

  tools:
    cmds:
      - go install github.com/cortesi/modd/cmd/modd@latest
      - go install mvdan.cc/sh/v3/cmd/shfmt@latest
      - go install mvdan.cc/sh/v3/cmd/gosh@latest
      - go install github.com/DarthSim/overmind/v2@latest
      - go install github.com/a-h/templ/cmd/templ@latest
      - go install golang.org/x/tools/cmd/goimports@latest

  generate:
    cmds:
      - go generate ./internal/...

  proto:fmt:
    cmds:
      - protobuild format

  proto:gen:
    cmds:
      - protobuild vendor
      - protobuild gen

  proto:lint:
    cmds:
      - protobuild lint

  vet:
    cmds:
      - env -u GOROOT go vet ./...
  test:
    cmds:
      - go test -short -race -v ./... -cover
  lint:
    cmds:
      - golangci-lint run --verbose ./...

  desktop:bindings:
    desc: "generate Wails bindings for desktop frontend"
    dir: "{{.DesktopDir}}"
    cmds:
      - go run github.com/wailsapp/wails/v3/cmd/wails3@latest generate bindings -clean=true -ts -i

  desktop:node:check:
    desc: "check Node.js version for Vite 8 (>=20.19 or >=22.12)"
    run: once
    cmds:
      - |
        node -e '
          const [maj, min] = process.versions.node.split(".").map(Number);
          const ok = (maj === 20 && min >= 19) || (maj === 22 && min >= 12) || maj > 22;
          if (!ok) {
            console.error("Node.js " + process.versions.node + " is not supported.");
            console.error("Please use Node >=20.19.0 or >=22.12.0 for Vite 8.");
            process.exit(1);
          }
          console.log("Node.js " + process.versions.node + " OK");
        '

  desktop:frontend:install:
    desc: "install desktop frontend dependencies"
    dir: "{{.FrontendDir}}"
    deps:
      - desktop:node:check
    cmds:
      - npm install

  desktop:frontend:build:
    desc: "build desktop frontend assets"
    dir: "{{.FrontendDir}}"
    cmds:
      - task: desktop:frontend:install
      - task: desktop:bindings
      - npm run build

  desktop:test:
    desc: "run desktop go tests"
    dir: "{{.DesktopDir}}"
    cmds:
      - go test ./...

  desktop:run:
    desc: "run desktop app from embedded frontend dist"
    dir: "{{.DesktopDir}}"
    cmds:
      - task: desktop:frontend:build
      - go run .

  desktop:dev:
    desc: "run desktop app in local dev mode (no wails3 hot reload)"
    dir: "{{.DesktopDir}}"
    cmds:
      - task: desktop:node:check
      - task: desktop:frontend:build
      - go run .

  desktop:verify:
    desc: "desktop regression baseline (build + tests)"
    cmds:
      - task: desktop:frontend:build
      - task: desktop:test
